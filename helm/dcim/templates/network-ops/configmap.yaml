apiVersion: v1
kind: ConfigMap
metadata:
    name: network-ops-config
    namespace: {{ include "dcim.namespace" . }}
    labels:
        {{- include "dcim.labels" . | nindent 8 }}
        app.kubernetes.io/component: network-ops
data:
    PORT: {{ .Values.networkOps.service.port | quote }}
    GO_ENV: {{ .Values.global.environment | quote }}
