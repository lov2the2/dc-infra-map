apiVersion: v1
kind: ConfigMap
metadata:
    name: app-config
    namespace: {{ include "dcim.namespace" . }}
    labels:
        {{- include "dcim.labels" . | nindent 8 }}
        app.kubernetes.io/component: app
data:
    NODE_ENV: {{ .Values.app.env.NODE_ENV | quote }}
    NEXTAUTH_URL: {{ .Values.app.env.NEXTAUTH_URL | quote }}
    AUTH_TRUST_HOST: {{ .Values.app.env.AUTH_TRUST_HOST | quote }}
    TIMESCALEDB_ENABLED: {{ .Values.app.env.TIMESCALEDB_ENABLED | quote }}
    NEXT_TELEMETRY_DISABLED: {{ .Values.app.env.NEXT_TELEMETRY_DISABLED | quote }}
    POWER_SERVICE_URL: "http://dcim-power-service.{{ include "dcim.namespace" . }}.svc.cluster.local:{{ .Values.goService.service.port }}"
    CORE_API_URL: "http://dcim-core-api.{{ include "dcim.namespace" . }}.svc.cluster.local:{{ .Values.coreApi.service.port }}"
    NETWORK_OPS_URL: "http://dcim-network-ops.{{ include "dcim.namespace" . }}.svc.cluster.local:{{ .Values.networkOps.service.port }}"
    # DATABASE_URL is generated from postgres credentials and stored in app-secret
