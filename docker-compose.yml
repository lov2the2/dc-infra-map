services:
    postgres:
        image: timescale/timescaledb:2.17.2-pg17
        container_name: dcim-postgres
        restart: unless-stopped
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: dcim
            POSTGRES_USER: dcim
            POSTGRES_PASSWORD: dcim_local_password
        volumes:
            - pgdata:/var/lib/postgresql/data
            - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U dcim -d dcim"]
            interval: 5s
            timeout: 5s
            retries: 5

    power-service:
        build:
            context: ./go-services
            dockerfile: Dockerfile
            args:
                SERVICE: power-service
        container_name: dcim-power-service
        restart: unless-stopped
        ports:
            - "8080:8080"
        environment:
            DATABASE_URL: postgresql://dcim:dcim_local_password@postgres:5432/dcim
            X_INTERNAL_SECRET: dev-internal-secret
            PORT: "8080"
        depends_on:
            postgres:
                condition: service_healthy

    core-api:
        build:
            context: ./go-services
            dockerfile: Dockerfile
            args:
                SERVICE: core-api
        container_name: dcim-core-api
        restart: unless-stopped
        ports:
            - "8081:8081"
        environment:
            DATABASE_URL: postgresql://dcim:dcim_local_password@postgres:5432/dcim
            X_INTERNAL_SECRET: dev-internal-secret
            PORT: "8081"
        depends_on:
            postgres:
                condition: service_healthy

    network-ops:
        build:
            context: ./go-services
            dockerfile: Dockerfile
            args:
                SERVICE: network-ops
        container_name: dcim-network-ops
        restart: unless-stopped
        ports:
            - "8082:8082"
        environment:
            DATABASE_URL: postgresql://dcim:dcim_local_password@postgres:5432/dcim
            X_INTERNAL_SECRET: dev-internal-secret
            PORT: "8082"
        depends_on:
            postgres:
                condition: service_healthy

volumes:
    pgdata:
