apiVersion: apps/v1
kind: Deployment
metadata:
    name: go-service
    namespace: dcim
    labels:
        app: go-service
spec:
    replicas: 1
    selector:
        matchLabels:
            app: go-service
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxUnavailable: 0
            maxSurge: 1
    template:
        metadata:
            labels:
                app: go-service
        spec:
            initContainers:
                # Wait for postgres to be ready before starting the service
                - name: wait-for-postgres
                  image: busybox:1.36
                  command:
                      - sh
                      - -c
                      - |
                          until nc -z postgres 5432; do
                            echo "Waiting for postgres..."
                            sleep 2
                          done
                          echo "Postgres is ready"
            containers:
                - name: go-service
                  image: dc-infra-map-go:latest
                  # Use local image (docker-desktop shares Docker daemon)
                  imagePullPolicy: IfNotPresent
                  ports:
                      - containerPort: 8080
                        name: http
                  envFrom:
                      - secretRef:
                            name: go-service-secret
                  readinessProbe:
                      tcpSocket:
                          port: 8080
                      initialDelaySeconds: 5
                      periodSeconds: 5
                      failureThreshold: 3
                  livenessProbe:
                      tcpSocket:
                          port: 8080
                      initialDelaySeconds: 15
                      periodSeconds: 10
                  resources:
                      requests:
                          cpu: 100m
                          memory: 128Mi
                      limits:
                          cpu: 500m
                          memory: 256Mi
