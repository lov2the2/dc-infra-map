apiVersion: v1
kind: Secret
metadata:
    name: go-service-secret
    namespace: dcim
    labels:
        app: go-service
type: Opaque
stringData:
    # Database URL (references postgres service)
    DATABASE_URL: "postgresql://dcim:dcim_k8s_password@postgres:5432/dcim"

    # Internal secret shared with Next.js for inter-service authentication
    INTERNAL_SECRET: "dcim-internal-secret-k8s"

    # HTTP port the Go service listens on
    PORT: "8080"
